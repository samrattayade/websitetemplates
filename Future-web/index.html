<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAMRAT TAYADE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
      color: #fff;
      overflow-x: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.05);
      position: sticky;
      top: 0;
    }

    header h1 {
      font-size: 1.5rem;
      letter-spacing: 2px;
     
    }

    

    nav a::after {
      content: '';
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: -5px;
      left: 0;
      background: cyan;
      transition: 0.3s;
    }

    nav a:hover::after {
      width: 100%;
    }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h2 {
      font-size: 3rem;
      background: linear-gradient(90deg, cyan, magenta);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero p {
      margin: 20px 0;
      opacity: 0.8;
    }

    .btn {
      padding: 12px 25px;
      border: 1px solid cyan;
      background: transparent;
      color: cyan;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: cyan;
      color: #000;
      box-shadow: 0 0 20px cyan;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 50px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(15px);
      transition: 0.4s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 0 25px rgba(0,255,255,0.5);
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.7;
    }

    /* Responsive */
    @media(max-width: 768px) {
      header {
        flex-direction: column;
      }
      .hero h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>SAMRAT TAYADE</h1>

</header>

<section class="hero">
  <h2>Next-Gen Interface</h2>
  <p>Experience futuristic design with smooth animations</p>
  <button class="btn">Get Started</button>
</section>

<section class="cards">
  <div class="card">High Performance UI</div>
  <div class="card">Responsive Design</div>
  <div class="card">Modern Animations</div>
  <div class="card">Scalable Components</div>
</section>

<footer>
  <p>© 2026 Futuristic UI. All rights reserved.</p>
</footer>

<script>
  // Simple animation effect
  document.querySelector('.btn').addEventListener('click', () => {
    alert('Welcome to the Future 🚀');
  });
</script>

</body>
</html>
